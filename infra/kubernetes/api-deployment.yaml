apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: streammind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: streammind-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: redis
        - name: CASSANDRA_HOST
          value: cassandra
        - name: USER_ID_SALT
          valueFrom:
            secretKeyRef:
              name: privacy-salt
              key: user-id-salt
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: streammind
spec:
  selector:
    app: api
  ports:
  - port: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-hpa
  namespace: streammind
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70