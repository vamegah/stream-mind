version: '3.8'

services:
  # Redis aggregator (placeholder for Flink)
  redis-aggregator:
    build: ./services/redis-aggregator
    container_name: streammind-aggregator
    depends_on:
      - kafka
      - redis
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
    volumes:
      - ./services/redis-aggregator:/app
    command: python aggregator.py

  # FastAPI backend
  api:
    build: ./services/api
    container_name: streammind-api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    volumes:
      - ./services/api/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React frontend (development server)
  frontend:
    build: ./frontend/react-dashboard
    container_name: streammind-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend/react-dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0