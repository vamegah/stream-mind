version: '3.8'

services:
  # Replace old aggregator
  redis-aggregator:
    profiles: ["legacy"]  # disable by default

  flink-jobmanager:
    image: streammind-flink:latest
    container_name: flink-jobmanager
    ports:
      - "8081:8081"
    environment:
      - JOB_CLASS=com.streammind.flink.TrendingAggregationJob
      - FLINK_PROPERTIES=jobmanager.rpc.address: flink-jobmanager
    depends_on:
      - kafka
      - cassandra
      - redis
    command: jobmanager
    volumes:
      - ./services/flink-jobs/target/flink-jobs-1.0-SNAPSHOT.jar:/opt/flink/usrlib/flink-jobs.jar

  flink-taskmanager:
    image: streammind-flink:latest
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      - FLINK_PROPERTIES=jobmanager.rpc.address: flink-jobmanager
    command: taskmanager
    scale: 2

  # FastAPI backend
  api:
    build: ./services/api
    container_name: streammind-api
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
    volumes:
      - ./services/api/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # React frontend (development server)
  frontend:
    build: ./frontend/react-dashboard
    container_name: streammind-frontend
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend/react-dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  ai-agent:
    build: ./services/ai-agent
    container_name: streammind-ai-agent
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - cassandra
    environment:
      - REDIS_HOST=redis
      - CASSANDRA_HOST=cassandra
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./services/ai-agent/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload